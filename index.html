<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>週間工事予定表（入力）</title>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    button, select { touch-action: manipulation; }
    body { font-family: sans-serif; margin: 0; padding: 12px; background: #f5f6f8; color: #222; }
    .head { max-width: 600px; margin: 0 auto 8px; }
    h1 { font-size: 17px; margin: 4px 0; }
    .sub { color: #666; font-size: 13px; }
    .weektoggle { display: flex; gap: 6px; margin: 8px 0 2px; }
    .weektoggle button { flex: 1; padding: 8px; font-size: 14px; border: 1px solid #00b900; border-radius: 8px; background: #fff; color: #00a000; }
    .weektoggle button.on { background: #00b900; color: #fff; font-weight: bold; }
    .modetoggle { display: flex; gap: 6px; margin: 6px 0 2px; }
    .modetoggle button { flex: 1; padding: 8px; font-size: 14px; border: 1px solid #bbb; border-radius: 8px; background: #fff; color: #555; }
    .modetoggle button.onY { background: #00b900; color: #fff; font-weight: bold; border-color: #00b900; }
    .modetoggle button.onJ { background: #e69500; color: #fff; font-weight: bold; border-color: #e69500; }
    .modehint { font-size: 12px; color: #777; margin: 2px 0 0; }
    .days.jmode .cell { border-color: #e69500; }
    .days.jmode .cell.maru { color: #e69500; border-color: #e69500; }
    .card { background: #fff; border-radius: 12px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.1); max-width: 600px; margin: 10px auto; }
    .card.pre { background: #f1f1f1; }
    .card.pre .gname { color: #888; }
    .gnamerow { display: flex; align-items: center; }
    .gname { font-size: 16px; font-weight: bold; }
    .gmoto { color: #666; font-size: 13px; margin-bottom: 6px; }
    .checks { display: flex; gap: 6px; margin: 4px 0 2px; flex-wrap: wrap; }
    .chk { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; padding: 4px 8px; border: 1px solid #ccc; border-radius: 14px; background: #fafafa; color: #555; }
    .chk.on { background: #e7f7ec; border-color: #2a7; color: #0a7a3a; font-weight: bold; }
    .chk input { width: 16px; height: 16px; }
    .kousyu { border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; }
    .krow { display: flex; justify-content: space-between; align-items: center; }
    .klabel { font-weight: bold; font-size: 14px; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; white-space: nowrap; }
    .tag.pre { background: #ddd; color: #777; }
    .tag.live { background: #e7f7ec; color: #0a0; }
    .save.done { background: #2a7 !important; }
    .editlink { font-size: 12px; color: #06c; background: none; border: none; padding: 4px 6px; }
    .days { display: flex; gap: 3px; margin: 6px 0; }
    .day { flex: 1; text-align: center; }
    .dlabel { font-size: 11px; color: #888; }
    .dlabel.sun { color: #d33; } .dlabel.sat { color: #36c; }
    .cell { width: 100%; height: 38px; border: 1px solid #ccc; border-radius: 8px; background: #fff; font-size: 17px; padding: 0; }
    .cell.maru { color: #0a0; border-color: #0a0; } .cell.bar { color: #999; }
    .bulk { display: flex; gap: 6px; margin: 4px 0; }
    .bulk button { flex: 1; padding: 6px; font-size: 12px; border: 1px solid #ccc; border-radius: 8px; background: #f7f7f7; color: #333; }
    .save { width: 100%; padding: 10px; font-size: 14px; border: none; border-radius: 8px; background: #00b900; color: #fff; margin-top: 6px; }
    .form { background: #fafafe; border: 1px solid #e0e0ee; border-radius: 8px; padding: 10px; margin-top: 8px; }
    .addtoggle { width: 100%; padding: 8px; font-size: 13px; border: 1px solid #00b900; border-radius: 8px; background: #fff; color: #00a000; margin-top: 10px; }
    .row { display: flex; gap: 6px; align-items: center; margin: 6px 0; flex-wrap: wrap; }
    select, input[type=text] { padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; }
    .chip { background: #eef; border-radius: 14px; padding: 4px 10px; font-size: 13px; display: inline-flex; align-items: center; gap: 4px; }
    .chip b { cursor: pointer; color: #c33; }
    .smallbtn { padding: 8px 12px; font-size: 13px; border: 1px solid #ccc; border-radius: 6px; background: #f3f3f3; }
    .confirm { width: 100%; padding: 10px; font-size: 14px; border: none; border-radius: 8px; background: #2a7; color: #fff; margin-top: 6px; }
    .delbtn { width: 100%; padding: 9px; font-size: 13px; border: 1px solid #c33; border-radius: 8px; background: #fff; color: #c33; margin-top: 6px; }
    #status { max-width: 600px; margin: 8px auto; padding: 10px; border-radius: 8px; background: #eef; font-size: 13px; white-space: pre-wrap; }
    .toast { position: fixed; left: 50%; top: 70px; transform: translateX(-50%); background: #2a7; color: #fff; padding: 10px 18px; border-radius: 20px; font-size: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.25); z-index: 9999; opacity: 0; transition: opacity .2s; pointer-events: none; max-width: 90%; text-align: center; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="head">
    <h1>週間工事予定表 ｜ 予定入力</h1>
    <div class="sub" id="who">読み込み中…</div>
    <div class="weektoggle" id="weektoggle" style="display:none;">
      <button id="btnThis" class="on">今週</button>
      <button id="btnNext">来週</button>
    </div>
    <div class="modetoggle" id="modetoggle" style="display:none;">
      <button id="btnYotei" class="onY">予定</button>
      <button id="btnJisseki">実績（当日の稼働）</button>
    </div>
    <div class="modehint" id="modehint"></div>
    <div class="sub" id="week"></div>
  </div>
  <div id="list"></div>
  <div id="status"></div>

  <script charset="utf-8" src="https://static.worksmobile.net/static/wm/woff/edge/3.7.1/sdk.js"></script>
  <script>
    var WOFF_ID = 'GQuT6taPudJXwARr1sNZVA';
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbwoL4KIN_xc1aZho3M3IcaTF0PMIioZyW4quil_Kw_fjdHNeh31zuDxperkwuk6dm9R/exec';

    var DAYS = ['日', '月', '火', '水', '木', '金', '土'];
    var profile = {}, weekStart = '';
    var thisWeekStart = '', nextWeekStart = '', targetWeekStart = '';
    var masters = { shumoku: [], ginoukou: [] };
    var inputMode = 'yotei';   // 'yotei'=予定 / 'jisseki'=実績
    var currentData = null;    // 直近に描画したデータ（モード切替で再描画する用）
    function blank7() { return ['', '', '', '', '', '', '']; }

    if (typeof woff === 'undefined') {
      setStatus('WOFF SDKが読み込めていません。');
    } else {
      setStatus('読み込み中…');
      woff.init({ woffId: WOFF_ID })
        .then(function () { return woff.getProfile(); })
        .then(function (p) {
          profile = p;
          document.getElementById('who').textContent = p.displayName + ' さんの担当現場';
          showCache();   // 前回の内容をすぐ表示（速く見せる）
          loadAll();     // 裏で最新を取得して差し替え
        })
        .catch(function (e) { setStatus('認証エラー: ' + e); });
    }

    // ── 通信（読み出し・書き込みともJSONP GETで1往復）──
    function jsonp(query, onOk) {
      var cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
      window[cb] = function (resp) {
        delete window[cb];
        if (!resp.ok) { setStatus('エラー: ' + (resp.error || '不明')); return; }
        if (onOk) onOk(resp.data || resp);
      };
      var s = document.createElement('script');
      s.src = GAS_URL + '?' + query + '&callback=' + cb + '&t=' + Date.now();
      s.onerror = function () { setStatus('通信エラー（GASのURLを確認してください）'); };
      s.onload = function () { s.remove(); };
      document.body.appendChild(s);
    }
    function q(params) {
      return Object.keys(params).map(function (k) { return k + '=' + encodeURIComponent(params[k]); }).join('&');
    }

    function showCache() {
      try {
        var c = localStorage.getItem('kjt_' + profile.displayName);
        if (c) render(JSON.parse(c), true);
      } catch (e) {}
    }
    function loadAll(ws) {
      var params = { user: profile.displayName };
      if (ws) params.weekStart = ws;
      jsonp('action=init&' + q(params), function (d) {
        masters = d.masters || { shumoku: [], ginoukou: [] };
        // キャッシュは「今週」の内容だけ保存（起動時に今週をすぐ表示するため）
        if (!d.thisWeekStart || d.weekStart === d.thisWeekStart) {
          try { localStorage.setItem('kjt_' + profile.displayName, JSON.stringify(d)); } catch (e) {}
        }
        render(d, false);
      });
    }

    // 週の切替（今週／来週）
    function switchWeek(ws) {
      if (!ws || ws === targetWeekStart) return;
      targetWeekStart = ws;
      updateWeekToggle();
      document.getElementById('list').innerHTML = '';
      setStatus('読み込み中…');
      loadAll(ws);
    }
    function updateWeekToggle() {
      var tg = document.getElementById('weektoggle');
      if (!thisWeekStart) { tg.style.display = 'none'; return; }
      tg.style.display = 'flex';
      document.getElementById('btnThis').className = (targetWeekStart === thisWeekStart) ? 'on' : '';
      document.getElementById('btnNext').className = (targetWeekStart === nextWeekStart) ? 'on' : '';
    }
    document.getElementById('btnThis').onclick = function () { switchWeek(thisWeekStart); };
    document.getElementById('btnNext').onclick = function () { switchWeek(nextWeekStart); };

    // 予定／実績モードの切替
    function switchMode(m) {
      if (m === inputMode) return;
      inputMode = m;
      updateModeToggle();
      if (currentData) render(currentData, false);   // 同じデータをその時のモードで描き直す
    }
    function updateModeToggle() {
      var mt = document.getElementById('modetoggle');
      mt.style.display = 'flex';
      document.getElementById('btnYotei').className = (inputMode === 'yotei') ? 'onY' : '';
      document.getElementById('btnJisseki').className = (inputMode === 'jisseki') ? 'onJ' : '';
      document.getElementById('modehint').textContent = (inputMode === 'jisseki')
        ? '実績モード：当日に実際に稼働した日を入れます（オレンジ）'
        : '予定モード：この先の予定を入れます（緑）';
    }
    document.getElementById('btnYotei').onclick = function () { switchMode('yotei'); };
    document.getElementById('btnJisseki').onclick = function () { switchMode('jisseki'); };

    // weekStart（日曜）から「6/28〜7/4」のような週の範囲文字列を作る
    function weekRangeLabel(ws) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(ws)) return ws;
      var p = ws.split('-'); var s = new Date(+p[0], +p[1] - 1, +p[2]);
      var e = new Date(s.getFullYear(), s.getMonth(), s.getDate() + 6);
      return (s.getMonth() + 1) + '/' + s.getDate() + '〜' + (e.getMonth() + 1) + '/' + e.getDate();
    }

    function render(data, fromCache) {
      if (data.masters) masters = data.masters;
      currentData = data;
      updateModeToggle();
      weekStart = data.weekStart;
      if (data.thisWeekStart) thisWeekStart = data.thisWeekStart;
      if (data.nextWeekStart) nextWeekStart = data.nextWeekStart;
      targetWeekStart = weekStart;
      updateWeekToggle();
      var which = (weekStart === nextWeekStart) ? '来週' : '今週';
      document.getElementById('week').textContent = which + '（' + weekRangeLabel(weekStart) + '）' + (fromCache ? '（前回の表示・更新中…）' : '');
      var list = document.getElementById('list'); list.innerHTML = '';
      if (!data.genba || !data.genba.length) { if (!fromCache) setStatus('担当の現場が見つかりませんでした。'); return; }
      if (!fromCache) setStatus('');
      data.genba.forEach(function (g) { list.appendChild(makeCard(g)); });
    }

    // 工事ごとの3チェック（指示・安全書類・注文書提出）。変更で即保存
    function makeChecks(g) {
      var wrap = el('div', 'checks');
      var defs = [['shiji', '指示'], ['anzen', '安全書類'], ['chumon', '注文書提出']];
      function send() {
        jsonp('action=saveChecks&' + q({
          user: profile.displayName, genbaId: g.genbaId,
          shiji: g.shiji ? 1 : 0, anzen: g.anzen ? 1 : 0, chumon: g.chumon ? 1 : 0
        }));
      }
      defs.forEach(function (d) {
        var key = d[0];
        var lab = el('label', 'chk');
        var cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = !!g[key];
        cb.onchange = function () { g[key] = cb.checked; lab.classList.toggle('on', cb.checked); send(); };
        lab.classList.toggle('on', !!g[key]);
        lab.appendChild(cb); lab.appendChild(document.createTextNode(d[1]));
        wrap.appendChild(lab);
      });
      return wrap;
    }

    function makeCard(g) {
      var card = el('div', 'card');
      var nameRow = el('div', 'gnamerow');
      nameRow.appendChild(el('div', 'gname', g.name));
      var gtag = el('span', 'tag');
      nameRow.appendChild(gtag);
      card.appendChild(nameRow);
      card.appendChild(el('div', 'gmoto', '元請：' + (g.moto || '-')));

      // 工事ごとのチェック（指示・安全書類・注文書提出）
      card.appendChild(makeChecks(g));

      // 現場の稼働前／稼働中を計算して、タグとカードの色を更新
      function recalcGenba() {
        var has = (g.kousyu || []).some(function (k) {
          return (k.yotei || []).some(function (v) { return v === '〇' || v === '－'; });
        });
        gtag.textContent = has ? '稼働中' : '稼働前';
        gtag.className = 'tag ' + (has ? 'live' : 'pre');
        card.className = 'card ' + (has ? 'live' : 'pre');
      }

      function removeCard() { if (card.parentNode) card.remove(); }

      var holder = el('div');
      var emptyNote = el('div', 'sub', '※ まだ工種がありません。下の「＋ 工種を追加」から登録してください。');
      if (!g.kousyu.length) holder.appendChild(emptyNote);
      g.kousyu.forEach(function (k) { holder.appendChild(makeKousyu(g, k, recalcGenba, removeCard)); });
      card.appendChild(holder);

      var toggle = el('button', 'addtoggle', '＋ 工種を追加');
      var formHolder = el('div'); formHolder.style.display = 'none';
      toggle.onclick = function () {
        if (formHolder.style.display === 'none') {
          formHolder.innerHTML = '';
          formHolder.appendChild(buildForm(g, null, {
            onAdded: function (newK) {
              if (emptyNote.parentNode) emptyNote.remove();
              g.kousyu.push(newK);
              holder.appendChild(makeKousyu(g, newK, recalcGenba, removeCard));
              formHolder.style.display = 'none';
              recalcGenba();
            }
          }));
          formHolder.style.display = 'block';
        } else { formHolder.style.display = 'none'; }
      };
      card.appendChild(toggle); card.appendChild(formHolder);
      recalcGenba();
      return card;
    }

    function makeKousyu(g, k, recalcGenba, removeCard) {
      var box = el('div', 'kousyu');
      var row = el('div', 'krow');
      var left = el('div'); left.style.display = 'flex'; left.style.alignItems = 'center';
      var label = el('div', 'klabel', k.shumoku + '：' + (k.ginoukou || '（技能工未設定）'));
      var tag = el('span', 'tag');
      var done = el('button', '', '✓ 完了にする');
      done.style.cssText = 'margin-left:8px; padding:3px 10px; font-size:11px; border:1px solid #2a7; border-radius:6px; background:#fff; color:#2a7; white-space:nowrap; flex-shrink:0; cursor:pointer;';
      left.style.flexWrap = 'wrap'; left.style.rowGap = '4px';
      left.appendChild(label); left.appendChild(tag); left.appendChild(done);
      var right = el('div'); right.style.whiteSpace = 'nowrap'; right.style.flexShrink = '0';
      var edit = el('button', 'editlink', '編集');
      var editHolder = el('div'); editHolder.style.display = 'none';
      edit.onclick = function () {
        if (editHolder.style.display === 'none') {
          editHolder.innerHTML = '';
          editHolder.appendChild(buildForm(g, k, {
            labelEl: label,
            onUpdated: function () { editHolder.style.display = 'none'; },
            onDeleted: function () { box.remove(); var i = g.kousyu.indexOf(k); if (i >= 0) g.kousyu.splice(i, 1); recalcGenba(); }
          }));
          editHolder.style.display = 'block';
        } else { editHolder.style.display = 'none'; }
      };
      done.onclick = function () {
        if (!window.confirm('「' + k.shumoku + '：' + (k.ginoukou || '技能工未設定') + '」を完了にします。\n画面から消えますがよろしいですか？')) return;
        // 先に画面から消す（サーバーは待たない＝速い）
        box.remove();
        var i = g.kousyu.indexOf(k); if (i >= 0) g.kousyu.splice(i, 1);
        if (recalcGenba) recalcGenba();
        toast('✓ 工種を完了にしました');
        jsonp('action=completeKousyu&' + q({ user: profile.displayName, kousyuId: k.kousyuId }));  // 裏で保存
        // これが最後の工種なら、工事の完工を確認（残数は画面側で判定）
        if (g.kousyu.length === 0) {
          if (window.confirm('この工事を完工にしますか？\n（' + g.name + '）\n完工にすると一覧から消えます。')) {
            if (removeCard) removeCard();
            toast('✓ 工事を完工にしました');
            jsonp('action=completeGenba&' + q({ user: profile.displayName, genbaId: g.genbaId }));  // 裏で保存
          }
        }
      };
      right.appendChild(edit);
      row.appendChild(left); row.appendChild(right);
      box.appendChild(row); box.appendChild(editHolder);

      // 予定／実績の配列を必ず用意（キャッシュの古いデータ対策）
      if (!k.yotei) k.yotei = blank7();
      if (!k.jisseki) k.jisseki = blank7();
      var arr = (inputMode === 'jisseki') ? k.jisseki : k.yotei;   // いま編集する側

      var days = el('div', 'days' + (inputMode === 'jisseki' ? ' jmode' : '')); var cells = [];
      for (var i = 0; i < 7; i++) {
        var col = el('div', 'day');
        col.appendChild(el('div', 'dlabel' + (i === 0 ? ' sun' : (i === 6 ? ' sat' : '')), DAYS[i]));
        var btn = el('button', 'cell'); setCell(btn, arr[i] || '');
        btn.onclick = (function (b) { return function () { cycle(b); syncLive(); }; })(btn);
        col.appendChild(btn); days.appendChild(col); cells.push(btn);
      }
      box.appendChild(days);

      // 工種タグ・現場タグは「予定」基準（実績モードで見ても稼働中/前は変わらない）
      function updateTag() {
        var has = (k.yotei || []).some(function (v) { return v === '〇' || v === '－'; });
        tag.textContent = has ? '稼働中' : '稼働前';
        tag.className = 'tag ' + (has ? 'live' : 'pre');
      }
      // 画面の今の状態を、編集中モードの配列へ書き戻す（保存はしない）
      function syncLive() {
        var vals = cells.map(function (c) { return c.dataset.val || ''; });
        if (inputMode === 'jisseki') k.jisseki = vals; else k.yotei = vals;
        updateTag();
        if (recalcGenba) recalcGenba();
      }
      updateTag();

      var bulk = el('div', 'bulk');
      var noneLabel = (inputMode === 'jisseki') ? '稼働なし（全部 −）' : '今週なし（全部 −）';
      var bNone = el('button', '', noneLabel); bNone.onclick = function () { cells.forEach(function (c) { setCell(c, '－'); }); syncLive(); };
      var bClr = el('button', '', 'クリア'); bClr.onclick = function () { cells.forEach(function (c) { setCell(c, ''); }); syncLive(); };
      bulk.appendChild(bNone); bulk.appendChild(bClr); box.appendChild(bulk);

      var saveLabel = (inputMode === 'jisseki') ? 'この工種の実績を保存' : 'この工種の予定を保存';
      var save = el('button', 'save', saveLabel);
      save.onclick = function () {
        syncLive();   // 表示中モードの値を配列へ反映
        // 予定・実績の両方を送って保存（編集していない側もそのまま保存される）
        save.textContent = '✓ 保存しました'; save.classList.add('done');
        setTimeout(function () { save.textContent = saveLabel; save.classList.remove('done'); }, 1500);
        jsonp('action=saveYotei&' + q({ user: profile.displayName, genbaId: g.genbaId, kousyuId: k.kousyuId, weekStart: weekStart, yotei: (k.yotei || blank7()).join(','), jisseki: (k.jisseki || blank7()).join(',') }));
      };
      box.appendChild(save);
      return box;
    }

    // 追加／編集フォーム
    function buildForm(g, existing, hooks) {
      var form = el('div', 'form');
      var picked = [];
      if (existing && existing.ginoukou) existing.ginoukou.split(/[、,]/).forEach(function (s) { s = s.trim(); if (s) picked.push(s); });

      var rowS = el('div', 'row'); rowS.appendChild(el('span', '', '種目：'));
      var selShu = document.createElement('select'); selShu.appendChild(opt('', '選択'));
      masters.shumoku.forEach(function (s) { selShu.appendChild(opt(s, s)); });
      if (existing) selShu.value = existing.shumoku;
      rowS.appendChild(selShu); form.appendChild(rowS);

      var rowG = el('div', 'row'); rowG.appendChild(el('span', '', '技能工：'));
      var selGi = document.createElement('select'); selGi.appendChild(opt('', '選択'));
      masters.ginoukou.forEach(function (s) { selGi.appendChild(opt(s, s)); });
      var addGi = el('button', 'smallbtn', '＋追加');
      rowG.appendChild(selGi); rowG.appendChild(addGi); form.appendChild(rowG);

      var rowN = el('div', 'row'); rowN.style.flexWrap = 'nowrap'; rowN.appendChild(el('span', '', '新規：'));
      var txtNew = document.createElement('input'); txtNew.type = 'text'; txtNew.placeholder = '一覧に無い技能工';
      txtNew.style.flex = '1'; txtNew.style.minWidth = '0';
      var addNew = el('button', 'smallbtn', '＋追加');
      addNew.style.flexShrink = '0';
      rowN.appendChild(txtNew); rowN.appendChild(addNew); form.appendChild(rowN);

      var chips = el('div', 'row'); form.appendChild(chips);
      function redraw() {
        chips.innerHTML = '';
        picked.forEach(function (name, idx) {
          var c = el('span', 'chip'); c.appendChild(document.createTextNode(name));
          var x = document.createElement('b'); x.textContent = '×';
          x.onclick = function () { picked.splice(idx, 1); redraw(); };
          c.appendChild(x); chips.appendChild(c);
        });
      }
      redraw();
      addGi.onclick = function () { var v = selGi.value; if (v && picked.indexOf(v) < 0) { picked.push(v); redraw(); } };
      addNew.onclick = function () { var v = txtNew.value.trim(); if (v && picked.indexOf(v) < 0) { picked.push(v); txtNew.value = ''; redraw(); } };

      var confirm = el('button', 'confirm', existing ? 'この工種を更新' : 'この工種を登録');
      confirm.onclick = function () {
        if (!selShu.value) { toast('種目を選んでください'); return; }
        confirm.disabled = true; confirm.textContent = '処理中…';
        var gino = picked.join('|');
        if (existing) {
          jsonp('action=updateKousyu&' + q({ user: profile.displayName, kousyuId: existing.kousyuId, shumoku: selShu.value, ginoukou: gino }), function () {
            existing.shumoku = selShu.value; existing.ginoukou = picked.join('、');
            if (hooks.labelEl) hooks.labelEl.textContent = existing.shumoku + '：' + (existing.ginoukou || '（技能工未設定）');
            toast('✓ 工種を更新しました'); hooks.onUpdated();
          });
        } else {
          jsonp('action=addKousyu&' + q({ user: profile.displayName, genbaId: g.genbaId, shumoku: selShu.value, ginoukou: gino }), function (res) {
            var newK = { kousyuId: res.kousyuId, shumoku: res.shumoku, ginoukou: res.ginoukou, yotei: ['', '', '', '', '', '', ''], jisseki: ['', '', '', '', '', '', ''] };
            toast('✓ 工種を追加しました'); hooks.onAdded(newK);
          });
        }
      };
      form.appendChild(confirm);

      if (existing) {
        var del = el('button', 'delbtn', 'この工種を削除');
        del.onclick = function () {
          if (!window.confirm('「' + existing.shumoku + '」を削除します。よろしいですか？')) return;
          del.disabled = true; del.textContent = '削除中…';
          jsonp('action=deleteKousyu&' + q({ user: profile.displayName, kousyuId: existing.kousyuId }), function () {
            toast('✓ 工種を削除しました'); hooks.onDeleted();
          });
        };
        form.appendChild(del);
      }
      return form;
    }

    function cycle(btn) { var v = btn.dataset.val || ''; setCell(btn, v === '' ? '〇' : (v === '〇' ? '－' : '')); }
    function setCell(btn, v) { btn.dataset.val = v; btn.textContent = v === '' ? '・' : v; btn.className = 'cell' + (v === '〇' ? ' maru' : (v === '－' ? ' bar' : '')); }
    function el(tag, cls, text) { var e = document.createElement(tag); if (cls) e.className = cls; if (text != null) e.textContent = text; return e; }
    function opt(val, text) { var o = document.createElement('option'); o.value = val; o.textContent = text; return o; }
    function setStatus(msg) { document.getElementById('status').textContent = msg; }
    function toast(msg) {
      var t = document.getElementById('toast');
      if (!t) { t = el('div', 'toast'); t.id = 'toast'; document.body.appendChild(t); }
      t.textContent = msg; t.classList.add('show');
      clearTimeout(toast._t); toast._t = setTimeout(function () { t.classList.remove('show'); }, 1800);
    }
  </script>
</body>
</html>
